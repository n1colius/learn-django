{% extends 'base.html' %}

{% block title %}{{ title }} - Task Manager{% endblock %}

{% block content %}
<div class="content-header">
    <h1>{{ title }}</h1>
    <p class="text-muted">Project: {{ project.name }}</p>
</div>

<div class="form-container">
    <form method="post">
        {% csrf_token %}

        {% for field in form %}
        <div class="form-group">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div class="field-error">{{ field.errors.0 }}</div>
            {% endif %}
        </div>
        {% endfor %}

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                {% if task %}Update{% else %}Create{% endif %} Task
            </button>
            <a href="{% url 'project_detail' pk=project.pk %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
