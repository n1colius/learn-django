{% extends 'base.html' %}

{% block title %}Delete Project - Task Manager{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Delete Project</h1>
    <div class="alert alert-error">
        <p>Are you sure you want to delete <strong>"{{ project.name }}"</strong>?</p>
        <p>This will also delete all tasks in this project. This action cannot be undone.</p>
    </div>

    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'project_detail' pk=project.pk %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
