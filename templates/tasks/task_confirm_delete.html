{% extends 'base.html' %}

{% block title %}Delete Task - Task Manager{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Delete Task</h1>
    <div class="alert alert-error">
        <p>Are you sure you want to delete <strong>"{{ task.title }}"</strong>?</p>
        <p>This will also delete all comments on this task. This action cannot be undone.</p>
    </div>

    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'task_detail' pk=task.pk %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
